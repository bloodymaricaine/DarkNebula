<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Melflix</title>
<style>
body{margin:0;background:#0b0f1a;color:#fff;font-family:sans-serif}
header{position:fixed;width:100%;top:0;text-align:center;padding:15px;font-size:26px;background:#020617;cursor:pointer;z-index:10}
.container{padding-top:80px}
/* ANA SAYFA */
.row{margin:20px}
.card{width:260px;height:340px;border-radius:12px;background-size:cover;cursor:pointer;}
/* PLAYER */
#playerPage{display:none;padding-top:80px;display:flex;}
.videoContainer{flex:1;position:relative;}
.video{width:100%;height:75vh;border:none;}
/* BÖLÜMLER */
.episodes{width:260px;height:calc(100vh - 80px);overflow-y:auto;background:#020617;padding:10px;}
.ep{padding:10px;border-radius:6px;cursor:pointer;margin-bottom:5px;}
.ep.active{background:#334155;}
/* BUTONLAR */
.overlay{position:absolute;padding:10px 16px;background:rgba(30,41,59,0.7);border-radius:10px;cursor:pointer;backdrop-filter:blur(5px);font-size:14px;}
#skip{left:20px;top:50%;transform:translateY(-50%);display:none;}
#next{right:50%;top:50%;transform:translate(50%, -50%);display:none;}
</style>
</head>
<body>
<header onclick="goHome()">Melflix</header>
<div id="main" class="container"></div>
<div id="playerPage">
  <div class="videoContainer">
    <iframe id="video" class="video" allow="autoplay" allowfullscreen></iframe>
    <div id="skip" class="overlay" onclick="skipIntro()">Intro Atla</div>
    <div id="next" class="overlay" onclick="nextEpisode()">Sonraki ▶</div>
  </div>
  <div id="episodes" class="episodes"></div>
</div>
<script>
/* DATA */
const data={s1:["_JKNDCvPc3A","4jHoj5geuJ8","50jkNwbNYFs","rWOJMX9xDyA","JVw2OrBg0Os","qCJhIAHU7c8","AjNAan3r_EQ","PBoW0shkDIo","xBou90Yk1i4","ZWxmhgtYBx4","QVPvEd4N81Y","FTsaUUU_P3M","3I7S6TjJ7A8","mJ7NWV-6jH8","H6L-jLRKpww","eyILMmMe_7E","eaFIR8BWqeQ","G-hrjJ3Nr8k","GsPRKoos0WM","vS0i3JIncaw","7tB3w0-vFzI","2qsQ8edARcU","8M1tc4nAhJg"],s2:[],s3:["xa2flcw","xa2fu2s","xa2fu2u","xa2fu2y","xa2fu2w"],s4:[]};
const titles={s1:"Metal Fusion",s2:"Metal Masters",s3:"Metal Fury",s4:"Shogun Steel"};
const images={s1:"https://i.imgur.com/L8otzmh.jpg",s2:"https://i.imgur.com/epo5CCa.jpg",s3:"https://i.imgur.com/Ttv8Bg9.jpg",s4:"https://i.imgur.com/PeMQ2VF.jpg"};
let currentSeason=null,currentEpisode=0,timer,currentTime=0,started=false;

/* ANA SAYFA */
function loadHome(){
  const main=document.getElementById("main"); main.innerHTML="";
  Object.keys(data).forEach(s=>{
    const row=document.createElement("div"); row.className="row";
    const title=document.createElement("h2"); title.innerText=titles[s];
    const card=document.createElement("div"); card.className="card"; card.style.backgroundImage=`url(${images[s]})`;
    card.onclick=()=>openSeason(s);
    row.appendChild(title); row.appendChild(card); main.appendChild(row);
  });
}

/* SEZON AÇ */
function openSeason(s){
  currentSeason=s; currentEpisode=0;
  document.getElementById("main").style.display="none";
  document.getElementById("playerPage").style.display="flex";
  loadEpisodes(); play();
}

/* BÖLÜMLER */
function loadEpisodes(){
  const ep=document.getElementById("episodes"); ep.innerHTML="";
  data[currentSeason].forEach((v,i)=>{
    const d=document.createElement("div");
    d.className="ep"+(i===currentEpisode?" active":"");
    d.innerText="Bölüm "+(i+1);
    d.onclick=()=>{currentEpisode=i;play();}
    ep.appendChild(d);
  });
}

/* VIDEO */
function play(startTime=0){
  clearInterval(timer); currentTime=startTime; started=false;
  const v=data[currentSeason][currentEpisode];
  let src=currentSeason==="s1"?`https://www.youtube.com/embed/${v}?autoplay=1&start=${startTime}`:`https://www.dailymotion.com/embed/video/${v}?autoplay=1&start=${startTime}`;
  document.getElementById("video").src=src;
  document.getElementById("skip").style.display="none"; document.getElementById("next").style.display="none";
  loadEpisodes();
  timer=setInterval(()=>{
    currentTime++; saveProgress();
    if(currentTime>1 && !started){started=true; document.getElementById("skip").style.display="block";}
    if(currentTime>=44){document.getElementById("skip").style.display="none";}
    if(currentTime>=1240){document.getElementById("next").style.display="block";}
    if(currentTime>=1320){nextEpisode();}
  },1000);
}

/* INTRO */
function skipIntro(){
  const v=data[currentSeason][currentEpisode];
  document.getElementById("video").src=`https://www.youtube.com/embed/${v}?autoplay=1&start=44`;
  document.getElementById("skip").style.display="none";
}

/* NEXT */
function nextEpisode(){if(currentEpisode<data[currentSeason].length-1){currentEpisode++; play();}}

/* ANA SAYFA */
function goHome(){
  document.getElementById("main").style.display="block";
  document.getElementById("playerPage").style.display="none";
  document.getElementById("video").src=""; clearInterval(timer);
}

/* KAYIT */
function saveProgress(){localStorage.setItem("melflix_progress", JSON.stringify({season:currentSeason,episode:currentEpisode,time:currentTime}));}

/* POPUP */
function checkProgress(){
  const data=JSON.parse(localStorage.getItem("melflix_progress")); if(!data) return;
  const popup=document.createElement("div"); popup.id="resumePopup";
  popup.style.position="fixed"; popup.style.bottom="20px"; popup.style.left="50%"; popup.style.transform="translateX(-50%)";
  popup.style.background="#020617"; popup.style.padding="15px"; popup.style.borderRadius="10px"; popup.style.zIndex="999";
  popup.innerHTML=`Kaldığın yer: ${titles[data.season]} Bölüm ${data.episode+1}<br><br>
  <button onclick="resume()">Devam Et</button>
  <button onclick="closePopup()">Kapat</button>`;
  document.body.appendChild(popup); window.resumeData=data;
}
function closePopup(){document.getElementById("resumePopup").remove();}
function resume(){
  const d=window.resumeData; currentSeason=d.season; currentEpisode=d.episode;
  document.getElementById("main").style.display="none"; document.getElementById("playerPage").style.display="flex";
  loadEpisodes(); play(d.time); closePopup();
}

loadHome(); checkProgress();
</script>
</body>
</html>
