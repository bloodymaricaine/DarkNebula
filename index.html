<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Melflix</title>

<style>
body{margin:0;background:#0b0f1a;color:#fff;font-family:sans-serif}
header{position:fixed;width:100%;top:0;text-align:center;padding:15px;font-size:28px;background:#020617;cursor:pointer;z-index:10}

.container{padding-top:80px}

.row{margin:20px}
.row h2{margin-bottom:10px}
.slider{display:flex;overflow-x:auto;gap:15px}
.card{min-width:220px;height:300px;border-radius:10px;background-size:cover;background-position:center;cursor:pointer}

#playerPage{display:none;padding-top:80px}
.video{width:100%;height:60vh;border:none}

.episodes{
position:fixed;
right:0;
top:80px;
width:220px;
height:calc(100vh - 80px);
overflow-y:auto;
background:#020617;
padding:10px
}
.ep{padding:8px;cursor:pointer;border-radius:5px}
.ep.active{background:#334155}

.overlay{
position:absolute;
padding:10px 15px;
background:rgba(0,0,0,0.5);
border-radius:8px;
cursor:pointer
}

#skip{left:20px;top:50%}
#next{right:20px;top:50%;display:none}
</style>
</head>

<body>

<header onclick="goHome()">Melflix</header>

<div id="main" class="container"></div>

<div id="playerPage">
  <div style="position:relative">
    <iframe id="video" class="video" allowfullscreen></iframe>
    <div id="skip" class="overlay" onclick="skipIntro()">Intro Atla</div>
    <div id="next" class="overlay" onclick="nextEpisode()">Sonraki ▶</div>
  </div>
  <div id="episodes" class="episodes"></div>
</div>

<script>

// SEZONLAR
const data={
s1:[
"_JKNDCvPc3A","4jHoj5geuJ8","50jkNwbNYFs","rWOJMX9xDyA",
"JVw2OrBg0Os","qCJhIAHU7c8","AjNAan3r_EQ"
],
s2:["x7xyzab","x7xyzac","x7xyzad"], // örnek
s3:["xa2flcw","xa2fu2s","xa2fu2u","xa2fu2y","xa2fu2w"],
s4:["x8abcd1","x8abcd2"]
};

const titles={
s1:"Metal Fusion",
s2:"Metal Masters",
s3:"Metal Fury",
s4:"Shogun Steel"
};

const images={
s1:"https://i.imgur.com/L8otzmh.jpg",
s2:"https://i.imgur.com/epo5CCa.jpg",
s3:"https://i.imgur.com/Ttv8Bg9.jpg",
s4:"https://i.imgur.com/PeMQ2VF.jpg"
};

let currentSeason=null;
let currentEpisode=0;
let timer;

// ANA SAYFA
function loadHome(){
const main=document.getElementById("main");
main.innerHTML="";

Object.keys(data).forEach(s=>{
const row=document.createElement("div");
row.className="row";

row.innerHTML=`<h2>${titles[s]}</h2>`;

const slider=document.createElement("div");
slider.className="slider";

const card=document.createElement("div");
card.className="card";
card.style.backgroundImage=`url(${images[s]})`;
card.onclick=()=>openSeason(s);

slider.appendChild(card);
row.appendChild(slider);
main.appendChild(row);
});
}

// SEZON AÇ
function openSeason(season){
currentSeason=season;
currentEpisode=0;

document.getElementById("main").style.display="none";
document.getElementById("playerPage").style.display="block";

loadEpisodes();
play();
}

// BÖLÜMLER LİSTESİ
function loadEpisodes(){
const epDiv=document.getElementById("episodes");
epDiv.innerHTML="";

data[currentSeason].forEach((v,i)=>{
const d=document.createElement("div");
d.className="ep"+(i===currentEpisode?" active":"");
d.innerText="Bölüm "+(i+1);
d.onclick=()=>{
currentEpisode=i;
play();
};
epDiv.appendChild(d);
});
}

// VIDEO OYNAT
function play(){
clearInterval(timer);

const v=data[currentSeason][currentEpisode];

let src="";
if(currentSeason==="s1"){
src=`https://www.youtube.com/embed/${v}?autoplay=1`;
}else{
src=`https://www.dailymotion.com/embed/video/${v}?autoplay=1`;
}

document.getElementById("video").src=src;

document.getElementById("skip").style.display="block";
document.getElementById("next").style.display="none";

loadEpisodes();

// TIMER
let t=0;
timer=setInterval(()=>{
t++;

if(t>44) document.getElementById("skip").style.display="none";
if(t>1239) document.getElementById("next").style.display="block";
if(t>1320) nextEpisode();

},1000);
}

// INTRO ATLAMA
function skipIntro(){
const v=data[currentSeason][currentEpisode];

if(currentSeason==="s1"){
document.getElementById("video").src=
`https://www.youtube.com/embed/${v}?autoplay=1&start=44`;
}else{
document.getElementById("video").src=
`https://www.dailymotion.com/embed/video/${v}?autoplay=1&start=44`;
}
}

// SONRAKİ
function nextEpisode(){
if(currentEpisode<data[currentSeason].length-1){
currentEpisode++;
play();
}
}

// ANA SAYFA
function goHome(){
document.getElementById("main").style.display="block";
document.getElementById("playerPage").style.display="none";
document.getElementById("video").src="";
clearInterval(timer);
}

loadHome();

</script>

</body>
</html>
