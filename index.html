<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Melflix</title>

<style>
    body{margin:0;background:#0b0f1a;color:#fff;font-family:sans-serif; overflow-x: hidden;}
    header{position:fixed;width:100%;top:0;text-align:center;padding:15px;font-size:26px;background:#020617;cursor:pointer;z-index:100;}
    .container{padding-top:80px; display: flex; flex-wrap: wrap; justify-content: center;}
    .row{margin:20px; text-align: center;}
    .card{width:260px;height:340px;border-radius:12px;background-size:cover;background-position:center;cursor:pointer; transition: transform 0.3s;}
    .card:hover{transform: scale(1.05);}
    
    #playerPage{display:none;padding-top:80px;}
    .videoContainer{
        width:100%;
        max-width: 1000px;
        margin: 0 auto;
        position:relative;
        aspect-ratio:16/9;
        background:black;
    }
    .videoContainer iframe{
        width:100%;
        height:100%;
        border: none;
    }
    .episodes{
        display:flex;
        overflow-x:auto;
        gap:10px;
        padding:20px;
        justify-content: center;
    }
    .ep{
        background:#1e293b;
        padding:10px 20px;
        border-radius:8px;
        cursor:pointer;
        white-space:nowrap;
    }
    .ep:hover{background: #334155;}
    
    .overlay{
        position:absolute;
        padding:12px 20px;
        background:rgba(0,0,0,0.8);
        border: 1px solid #fff;
        cursor:pointer;
        z-index: 20;
        display: none; /* Başlangıçta gizli */
        border-radius: 4px;
    }
    #skip{left:20px; bottom:60px;} /* Konum iyileştirildi */
    #next{right:20px; bottom:60px;}
</style>
</head>

<body>

        <div id="next" class="overlay" onclick="nextEpisode()">Sonraki Bölüm ▶</div>
    </div>
    <div class="episodes" id="episodes"></div>
</div>
