<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beyblade Arena</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0f172a;
    color:white;
}

header {
    text-align:center;
    padding:15px;
    background:#020617;
    color:#38bdf8;
}

.container {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
    gap:15px;
    padding:15px;
}

.card {
    background:#1e293b;
    border-radius:15px;
    overflow:hidden;
    cursor:pointer;
    transition:0.3s;
}

.card:hover {
    transform:scale(1.05);
}

.card img {
    width:100%;
    height:200px;
    object-fit:cover;
}

.card h3 {
    padding:10px;
    font-size:14px;
}

#episodes { display:none; }

.back {
    margin:10px;
    padding:10px;
    background:#38bdf8;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.modal {
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
}

.modal iframe {
    width:90%;
    height:50%;
}
</style>
</head>

<body>

<header>⚡ Beyblade Arena</header>

<!-- SEZONLAR -->
<div id="seasons" class="container">

<div class="card" onclick="openSeason('s1')">
<img src="https://i.imgur.com/8.jpg">
<h3>Sezon 1</h3>
</div>

<div class="card" onclick="openSeason('s2')">
<img src="https://i.imgur.com/9.jpg">
<h3>Sezon 2</h3>
</div>

<div class="card" onclick="openSeason('s3')">
<img src="https://i.imgur.com/10.jpg">
<h3>Sezon 3 (Metal Fury)</h3>
</div>

</div>

<!-- BÖLÜMLER -->
<div id="episodes">
<button class="back" onclick="goBack()">⬅ Geri</button>
<div class="container" id="episodeList"></div>
</div>

<!-- video -->
<div class="modal" id="videoModal" onclick="closeVideo()">
<iframe id="videoFrame" src="" frameborder="0" allowfullscreen></iframe>
</div>

<script>

// otomatik 1-39 bölüm oluştur
let metalFury = [];
for (let i = 1; i <= 39; i++) {
    metalFury.push({
        title: "Beyblade Metal Fury " + i + ". Bölüm",
        link: "https://www.youtube.com/embed/VIDEO_LINK_" + i
    });
}

const data = {
    s1: [
        {title:"1. Bölüm", link:"https://www.youtube.com/embed/19qpqjebafg"}
    ],
    s2: [
        {title:"1. Bölüm", link:"https://www.youtube.com/embed/aqz-KE-bpKQ"}
    ],
    s3: metalFury
};

function openSeason(season) {
    document.getElementById("seasons").style.display = "none";
    document.getElementById("episodes").style.display = "block";

    let list = document.getElementById("episodeList");
    list.innerHTML = "";

    data[season].forEach(ep => {
        list.innerHTML += `
        <div class="card" onclick="openVideo('${ep.link}')">
            <img src="https://i.imgur.com/10.jpg">
            <h3>${ep.title}</h3>
        </div>`;
    });
}

function goBack() {
    document.getElementById("episodes").style.display = "none";
    document.getElementById("seasons").style.display = "grid";
}

function openVideo(link) {
    document.getElementById("videoModal").style.display = "flex";
    document.getElementById("videoFrame").src = link;
}

function closeVideo() {
    document.getElementById("videoModal").style.display = "none";
    document.getElementById("videoFrame").src = "";
}

</script>

</body>
</html>
