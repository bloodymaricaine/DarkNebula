<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DarkNebula.net</title>
<style>
body {margin:0;font-family:Arial;background:#0f172a;color:white;}
header {text-align:center;padding:15px;background:#020617;font-size:26px;font-weight:bold;cursor:pointer;}
#seasons {display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;padding:20px;}
.card {height:160px;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:bold;cursor:pointer;background-size:cover;background-position:center;box-shadow:0 5px 20px rgba(0,0,0,0.5);}
#playerPage {display:none;padding:10px;}
.video {width:100%;height:60vh;}
#episodes {display:flex;overflow-x:auto;gap:10px;margin-top:10px;}
.ep {background:#1e293b;padding:10px;border-radius:10px;cursor:pointer;white-space:nowrap;}
.active {border:2px solid red;}
</style>
</head>
<body>

<header onclick="goHome()">DarkNebula.net</header>

<div id="seasons">
  <div class="card" onclick="openSeason('s1')" style="background-image:url('https://i.imgur.com/L8otzmh.jpg')">Metal Fusion</div>
  <!-- Diğer sezonlar buraya eklenecek -->
</div>

<div id="playerPage">
  <iframe id="videoFrame" class="video" frameborder="0" allowfullscreen allow="autoplay"></iframe>
  <div id="episodes"></div>
</div>

<script>
let currentSeason = "";
let currentIndex = 0;

const data = {
  s1: [
    "_JKNDCvPc3A",
    "4jHoj5geuJ8",
    "50jkNwbNYFs",
    "rWOJMX9xDyA",
    "JVw2OrBg0Os",
    "qCJhIAHU7c8",
    "AjNAan3r_EQ",
    "PBoW0shkDIo",
    "xBou90Yk1i4",
    "xBou90Yk1i4",
    "ZWxmhgtYBx4",
    "QVPvEd4N81Y",
    "FTsaUUU_P3M",
    "3I7S6TjJ7A8",
    "mJ7NWV-6jH8",
    "H6L-jLRKpww",
    "eyILMmMe_7E",
    "eaFIR8BWqeQ",
    "G-hrjJ3Nr8k",
    "GsPRKoos0WM",
    "GsPRKoos0WM",
    "vS0i3JIncaw",
    "7tB3w0-vFzI",
    "2qsQ8edARcU",
    "8M1tc4nAhJg"
  ]
};

function openSeason(season){
  currentSeason = season;
  currentIndex = 0;
  document.getElementById("seasons").style.display = "none";
  document.getElementById("playerPage").style.display = "block";
  renderEpisodes();
  playVideo(currentIndex);
}

function renderEpisodes(){
  const container = document.getElementById("episodes");
  container.innerHTML = "";
  data[currentSeason].forEach((vid,i)=>{
    const el = document.createElement("div");
    el.className = "ep";
    if(i===currentIndex) el.classList.add("active");
    el.innerText = "Bölüm " + (i+1);
    el.onclick = () => {
      currentIndex=i;
      playVideo(i);
      renderEpisodes();
    };
    container.appendChild(el);
  });
}

function playVideo(i){
  const id = data[currentSeason][i];
  document.getElementById("videoFrame").src = "https://www.youtube.com/embed/" + id + "?autoplay=1";
}

function goHome(){
  document.getElementById("playerPage").style.display = "none";
  document.getElementById("seasons").style.display = "grid";
  document.getElementById("videoFrame").src = "";
}
</script>

</body>
</html>
