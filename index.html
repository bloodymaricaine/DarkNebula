<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beyblade Arena</title>
<style>
body {margin:0; font-family: Arial; background:#0f172a; color:white;}
header {display:flex; justify-content:space-between; align-items:center; background:#020617; padding:15px;}
header h1 {color:#38bdf8; font-size:20px;}
.toggle {cursor:pointer; background:#38bdf8; border:none; padding:8px 12px; border-radius:10px;}
.container {display:grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap:15px; padding:15px;}
.card {background:#1e293b; border-radius:15px; overflow:hidden; cursor:pointer; transition:0.3s;}
.card:hover {transform:scale(1.05);}
.card img {width:100%; height:200px; object-fit:cover;}
.card h3 {padding:10px; font-size:14px;}
#episodes {display:none;}
.back {margin:10px; padding:10px; background:#38bdf8; border:none; border-radius:10px; cursor:pointer;}
.modal {display:none; position:fixed; width:100%; height:100%; background:rgba(0,0,0,0.9); justify-content:center; align-items:center;}
.modal iframe {width:90%; height:50%;}
.light {background:#f1f5f9; color:black;}
</style>
</head>
<body>

<header>
<h1>⚡ Beyblade Arena</h1>
<button class="toggle" onclick="toggleMode()">🌙/☀️</button>
</header>

<!-- SEZONLAR -->
<div id="seasons" class="container">
<div class="card" onclick="openSeason('s3')">
<img src="https://i.imgur.com/10.jpg">
<h3>Sezon 3 (Metal Fury)</h3>
</div>
</div>

<!-- BÖLÜMLER -->
<div id="episodes">
<button class="back" onclick="goBack()">⬅ Geri</button>
<div class="container" id="episodeList"></div>
</div>

<!-- video -->
<div class="modal" id="videoModal" onclick="closeVideo()">
<iframe id="videoFrame" src="" frameborder="0" allowfullscreen></iframe>
</div>

<script>
// 3. sezon 1-39 bölüm
const metalFury = [];
for(let i=1; i<=39; i++){
    metalFury.push({
        title: `Beyblade Metal Fury ${i}. Bölüm`,
        link: `VIDEO_LINK_${i}` // burayı kendi Vimeo/Streamable embed linklerinle değiştir
    });
}

const data = { s3: metalFury };

function openSeason(season){
    document.getElementById("seasons").style.display="none";
    document.getElementById("episodes").style.display="block";
    let list = document.getElementById("episodeList");
    list.innerHTML="";
    data[season].forEach(ep=>{
        list.innerHTML+=`
        <div class="card" onclick="openVideo('${ep.link}')">
            <img src="https://i.imgur.com/10.jpg">
            <h3>${ep.title}</h3>
        </div>`;
    });
}

function goBack(){
    document.getElementById("episodes").style.display="none";
    document.getElementById("seasons").style.display="grid";
}

function openVideo(link){
    document.getElementById("videoModal").style.display="flex";
    document.getElementById("videoFrame").src=link;
}

function closeVideo(){
    document.getElementById("videoModal").style.display="none";
    document.getElementById("videoFrame").src="";
}

function toggleMode(){
    document.body.classList.toggle("light");
}
</script>

</body>
</html>
