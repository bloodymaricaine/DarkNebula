<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melflix - Beyblade</title>
    <style>
        :root { --bg: #020617; --card-bg: #1e293b; --accent: #3b82f6; }
        body { margin: 0; background: #0b0f1a; color: #fff; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        
        header { position: fixed; width: 100%; top: 0; text-align: center; padding: 15px; font-size: 26px; background: var(--bg); cursor: pointer; z-index: 2000; box-shadow: 0 4px 15px rgba(0,0,0,0.7); color: var(--accent); font-weight: bold; }
        
        /* Ana Ekran */
        .container { padding: 120px 20px 40px; display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; min-height: 100vh; }
        .row { text-align: center; width: 220px; }
        .card { width: 100%; height: 300px; border-radius: 12px; background-color: var(--card-bg); background-size: cover; background-position: center; cursor: pointer; transition: 0.3s; border: 3px solid transparent; }
        .card:hover { transform: scale(1.05); border-color: var(--accent); }

        /* Player Sayfası */
        #playerPage { display: none; padding-top: 80px; height: calc(100vh - 80px); }
        .player-layout { display: flex; height: 100%; padding: 20px; gap: 20px; box-sizing: border-box; }
        
        @media (max-width: 900px) { 
            .player-layout { flex-direction: column; overflow-y: auto; }
            .episodes-sidebar { max-width: 100% !important; min-height: 300px; }
        }

        .video-main { flex: 3; position: relative; background: #000; border-radius: 12px; overflow: hidden; aspect-ratio: 16/9; }
        #videoContainer { width: 100%; height: 100%; }

        /* Sağ Bölüm Listesi */
        .episodes-sidebar { flex: 1; background: var(--bg); border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; border: 1px solid #1e293b; max-width: 350px; }
        .sidebar-header { padding: 15px; background: #1e293b; font-weight: bold; border-bottom: 2px solid #0f172a; }
        .ep-list { overflow-y: auto; flex: 1; padding: 10px; z-index: 100; }
        .ep-item { padding: 12px; background: #0f172a; margin-bottom: 8px; border-radius: 6px; cursor: pointer; transition: 0.2s; border-left: 4px solid transparent; }
        .ep-item:hover { background: #1e293b; }
        .ep-item.active { background: var(--accent); color: white; border-left-color: #fff; }

        /* Intro Atla Butonu */
        .overlay-btn { position: absolute; padding: 12px 25px; background: rgba(0,0,0,0.85); color: white; border: 2px solid var(--accent); cursor: pointer; display: none; border-radius: 30px; font-weight: bold; z-index: 500; bottom: 40px; left: 30px; }
    </style>
</head>
<body>

<header onclick="window.location.reload()">Melflix</header>

<div id="main" class="container"></div>

<div id="playerPage">
    <div class="player-layout">
        <div class="video-main">
            <div id="videoContainer"></div>
            <div id="skipBtn" class="overlay-btn" onclick="skipIntro()">Intro Atla</div>
        </div>
        <div class="episodes-sidebar">
            <div class="sidebar-header" id="seasonTitle">Bölümler</div>
            <div id="epList" class="ep-list"></div>
        </div>
    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
// 1. SEZON - 51 BÖLÜMÜN TAMAMI (Örnek ID'ler ile doldurulmuştur)
const s1_ids = [
    "pL-l2A0I_8o", "B83v03W78nQ", "qMvLp77v1kY", "kE2X1XvKzO8", "T7p9N2Gz_C0", "3wGzN2Gz_C0", "Lp9N2Gz_C0", "M7p9N2Gz_C0",
    "N7p9N2Gz_C0", "O7p9N2Gz_C0", "P7p9N2Gz_C0", "R7p9N2Gz_C0", "S7p9N2Gz_C0", "U7p9N2Gz_C0", "V7p9N2Gz_C0", "Y7p9N2Gz_C0",
    "Z7p9N2Gz_C0", "A1p9N2Gz_C0", "B1p9N2Gz_C0", "C1p9N2Gz_C0", "D1p9N2Gz_C0", "E1p9N2Gz_C0", "F1p9N2Gz_C0", "G1p9N2Gz_C0",
    "H1p9N2Gz_C0", "J1p9N2Gz_C0", "K1p9N2Gz_C0", "L1p9N2Gz_C0", "M1p9N2Gz_C0", "N1p9N2Gz_C0", "O1p9N2Gz_C0", "P1p9N2Gz_C0",
    "R1p9N2Gz_C0", "S1p9N2Gz_C0", "T1p9N2Gz_C0", "U1p9N2Gz_C0", "V1p9N2Gz_C0", "Y1p9N2Gz_C0", "Z1p9N2Gz_C0", "A2p9N2Gz_C0",
    "B2p9N2Gz_C0", "C2p9N2Gz_C0", "D2p9N2Gz_C0", "E2p9N2Gz_C0", "F2p9N2Gz_C0", "G2p9N2Gz_C0", "H2p9N2Gz_C0", "J2p9N2Gz_C0",
    "K2p9N2Gz_C0", "L2p9N2Gz_C0", "M2p9N2Gz_C0"
];

const data = {
    s1: s1_ids,
    s2: ["YvJkE209XBo", "59C8F-1B_0I"],
    s3: ["x8m58gu", "x8m58gv"], // Dailymotion Sezonu
    s4: ["m5GZ6e8q6eM"]
};

const config = {
    titles: { s1: "Metal Fusion", s2: "Metal Masters", s3: "Metal Fury", s4: "Shogun Steel" },
    images: {
        s1: "https://i.imgur.com/L8otzmh.jpg",
        s2: "https://i.imgur.com/Ttv8Bg9.jpg",
        s3: "https://i.imgur.com/Ttv8Bg9.jpg",
        s4: "https://i.imgur.com/L8otzmh.jpg"
    }
};

let ytApiReady = false;
let currentS = null;
let currentE = 0;
let player = null;
let timer = null;

function onYouTubeIframeAPIReady() { ytApiReady = true; }

function loadHome() {
    const mainArea = document.getElementById("main");
    mainArea.innerHTML = "";
    Object.keys(data).forEach(s => {
        const div = document.createElement("div");
        div.className = "row";
        div.innerHTML = `<h3>${config.titles[s]}</h3><div class="card" style="background-image:url('${config.images[s]}')" onclick="openSeason('${s}')"></div>`;
        mainArea.appendChild(div);
    });
}

function openSeason(s) {
    currentS = s;
    currentE = 0;
    document.getElementById("main").style.display = "none";
    document.getElementById("playerPage").style.display = "block";
    document.getElementById("seasonTitle").innerText = config.titles[s];
    loadVideo();
}

function renderEpisodes() {
    const list = document.getElementById("epList");
    list.innerHTML = "";
    data[currentS].forEach((_, i) => {
        const item = document.createElement("div");
        item.className = `ep-item ${i === currentE ? 'active' : ''}`;
        item.innerText = `${i + 1}. Bölüm`;
        item.onclick = () => { currentE = i; loadVideo(); };
        list.appendChild(item);
    });
}

function loadVideo() {
    clearInterval(timer);
    const videoBox = document.getElementById("videoContainer");
    const skipBtn = document.getElementById("skipBtn");
    
    // Önceki player'ı temizle
    if (player && player.destroy) { player.destroy(); }
    videoBox.innerHTML = ""; 
    skipBtn.style.display = "none";
    
    const id = data[currentS][currentE];
    renderEpisodes();

    if (currentS !== "s3") { // YouTube Sezonları
        if (!ytApiReady) { setTimeout(loadVideo, 500); return; }
        player = new YT.Player('videoContainer', {
            videoId: id,
            playerVars: { 'autoplay': 1, 'rel': 0, 'modestbranding': 1 },
            events: {
                'onReady': (e) => { e.target.playVideo(); startTracking(); },
                'onStateChange': (e) => { if(e.data === YT.PlayerState.ENDED) nextEp(); }
            }
        });
    } else { // Dailymotion Sezonu
        videoBox.innerHTML = `<iframe id="dmPlayer" src="https://www.dailymotion.com/embed/video/${id}?autoplay=1" allow="autoplay; fullscreen"></iframe>`;
        startTracking();
    }
}

function startTracking() {
    let dmSec = 0;
    timer = setInterval(() => {
        let now = 0;
        if (player && player.getCurrentTime) {
            now = player.getCurrentTime();
        } else {
            dmSec++;
            now = dmSec;
        }

        const skipBtn = document.getElementById("skipBtn");
        // 44. saniyeye kadar göster
        if (now > 1 && now < 44) {
            skipBtn.style.display = "block";
        } else {
            skipBtn.style.display = "none";
        }
    }, 1000);
}

function skipIntro() {
    if (player && player.seekTo) {
        player.seekTo(44, true);
    } else {
        const id = data[currentS][currentE];
        document.getElementById("videoContainer").innerHTML = `<iframe src="https://www.dailymotion.com/embed/video/${id}?autoplay=1&start=44" allow="autoplay; fullscreen"></iframe>`;
    }
    document.getElementById("skipBtn").style.display = "none";
}

function nextEp() {
    if (currentE < data[currentS].length - 1) {
        currentE++;
        loadVideo();
    }
}

window.onload = loadHome;
</script>
</body>
</html>
