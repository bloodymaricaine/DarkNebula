<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Melflix</title>

<style>
body{margin:0;background:#0b0f1a;color:#fff;font-family:sans-serif}
header{position:fixed;width:100%;top:0;text-align:center;padding:15px;font-size:26px;background:#020617;cursor:pointer;z-index:10}

.container{padding-top:80px}
.row{margin:20px}
.slider{display:flex;gap:15px}
.card{width:240px;height:320px;border-radius:12px;background-size:cover;cursor:pointer}

#playerPage{display:none;padding-top:80px}
.video{width:100%;height:60vh;border:none}

.episodes{
position:fixed;
right:0;
top:80px;
width:230px;
height:calc(100vh - 80px);
overflow-y:auto;
background:#020617;
padding:10px
}
.ep{padding:10px;border-radius:6px;cursor:pointer}
.ep.active{background:#334155}

.overlay{
position:absolute;
padding:10px 18px;
background:rgba(30,41,59,0.7);
border-radius:10px;
cursor:pointer;
backdrop-filter:blur(5px);
font-size:14px;
}

#skip{left:20px;top:50%}
#next{right:20px;top:50%;display:none}
</style>
</head>

<body>

<header onclick="goHome()">Melflix</header>

<div id="main" class="container"></div>

<div id="playerPage">
  <div style="position:relative">
    <iframe id="video" class="video" allow="autoplay" allowfullscreen></iframe>

    <div id="skip" class="overlay" onclick="skipIntro()">Intro Atla</div>
    <div id="next" class="overlay" onclick="nextEpisode()">Sonraki ▶</div>
  </div>

  <div id="episodes" class="episodes"></div>
</div>

<script>

const data={
s1:[
"_JKNDCvPc3A","4jHoj5geuJ8","50jkNwbNYFs","rWOJMX9xDyA",
"JVw2OrBg0Os","qCJhIAHU7c8","AjNAan3r_EQ"
],
s2:["x7xyzab","x7xyzac"],
s3:["xa2flcw","xa2fu2s","xa2fu2u","xa2fu2y","xa2fu2w"],
s4:["x8abcd1"]
};

const titles={
s1:"Metal Fusion",
s2:"Metal Masters",
s3:"Metal Fury",
s4:"Shogun Steel"
};

const images={
s1:"https://i.imgur.com/L8otzmh.jpg",
s2:"https://i.imgur.com/epo5CCa.jpg",
s3:"https://i.imgur.com/Ttv8Bg9.jpg",
s4:"https://i.imgur.com/PeMQ2VF.jpg"
};

let currentSeason=null;
let currentEpisode=0;
let timer;
let currentTime=0;

// ANA SAYFA
function loadHome(){
const main=document.getElementById("main");
main.innerHTML="";

Object.keys(data).forEach(s=>{
const row=document.createElement("div");
row.className="row";
row.innerHTML=`<h2>${titles[s]}</h2>`;

const card=document.createElement("div");
card.className="card";
card.style.backgroundImage=`url(${images[s]})`;
card.onclick=()=>openSeason(s);

row.appendChild(card);
main.appendChild(row);
});
}

// SEZON
function openSeason(s){
currentSeason=s;
currentEpisode=0;

document.getElementById("main").style.display="none";
document.getElementById("playerPage").style.display="block";

loadEpisodes();
play();
}

// BÖLÜMLER
function loadEpisodes(){
const ep=document.getElementById("episodes");
ep.innerHTML="";

data[currentSeason].forEach((v,i)=>{
const d=document.createElement("div");
d.className="ep"+(i===currentEpisode?" active":"");
d.innerText="Bölüm "+(i+1);
d.onclick=()=>{currentEpisode=i;play();}
ep.appendChild(d);
});
}

// OYNAT
function play(){
clearInterval(timer);
currentTime=0;

const v=data[currentSeason][currentEpisode];

let src = currentSeason==="s1"
? `https://www.youtube.com/embed/${v}?autoplay=1`
: `https://www.dailymotion.com/embed/video/${v}?autoplay=1`;

document.getElementById("video").src=src;

document.getElementById("skip").style.display="block";
document.getElementById("next").style.display="none";

loadEpisodes();

// ZAMAN SİMÜLASYONU
timer=setInterval(()=>{
currentTime++;

// INTRO 44 sn sonra kaybolur
if(currentTime>=44){
document.getElementById("skip").style.display="none";
}

// 20:39 → NEXT ÇIKAR
if(currentTime>=1239){
document.getElementById("next").style.display="block";
}

// 22 dk → otomatik geç
if(currentTime>=1320){
nextEpisode();
}

},1000);
}

// INTRO ATLAMA (video durmaz)
function skipIntro(){
const v=data[currentSeason][currentEpisode];

if(currentSeason==="s1"){
document.getElementById("video").src=
`https://www.youtube.com/embed/${v}?autoplay=1&start=44`;
}else{
document.getElementById("video").src=
`https://www.dailymotion.com/embed/video/${v}?autoplay=1&start=44`;
}

document.getElementById("skip").style.display="none";
}

// SONRAKİ
function nextEpisode(){
if(currentEpisode < data[currentSeason].length-1){
currentEpisode++;
play();
}
}

// ANA SAYFA
function goHome(){
document.getElementById("main").style.display="block";
document.getElementById("playerPage").style.display="none";
document.getElementById("video").src="";
clearInterval(timer);
}

loadHome();

</script>

</body>
</html>
