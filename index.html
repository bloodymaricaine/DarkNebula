<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Melflix</title>

<style>
body{margin:0;background:#0b0f1a;color:#fff;font-family:sans-serif;}
header{position:fixed;width:100%;top:0;text-align:center;padding:15px;font-size:26px;background:#020617;cursor:pointer;z-index:10;}
.container{padding-top:80px;}
.row{margin:20px;}
.card{width:260px;height:340px;border-radius:12px;background-size:cover;background-position:center;cursor:pointer;}
#playerPage{display:none;padding-top:80px;}
.videoContainer{
  width:100%;
  position:relative;
  aspect-ratio:16/9;
  background:black;
}
.videoContainer iframe{
  width:100%;
  height:100%;
}
.episodes{
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
}
.ep{
  background:#1e293b;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  white-space:nowrap;
}
.overlay{
  position:absolute;
  padding:10px;
  background:#000a;
  cursor:pointer;
}
#skip{left:10px;top:50%;}
#next{right:10px;top:50%;}
</style>
</head>

<body>

<header onclick="goHome()">Melflix</header>

<div id="main" class="container"></div>

<div id="playerPage">
  <div class="videoContainer" id="videoContainer"></div>
  <div id="skip" class="overlay" onclick="skipIntro()">Intro Atla</div>
  <div id="next" class="overlay" onclick="nextEpisode()">Sonraki ▶</div>
  <div class="episodes" id="episodes"></div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
let ytReady=false;
function onYouTubeIframeAPIReady(){ ytReady=true; }

const data={
s1:[
"_JKNDCvPc3A","4jHoj5geuJ8","50jkNwbNYFs",
"rWOJMX9xDyA","JVw2OrBg0Os","qCJhIAHU7c8"
],
s3:["xa2flcw","xa2fu2s","xa2fu2u"]
};

const titles={s1:"Metal Fusion",s3:"Metal Fury"};
const images={
s1:"https://i.imgur.com/L8otzmh.jpg",
s3:"https://i.imgur.com/Ttv8Bg9.jpg"
};

let currentSeason=null;
let currentEpisode=0;
let currentTime=0;
let player=null;
let timer=null;

/* HOME */
function loadHome(){
  const main=document.getElementById("main");
  main.innerHTML="";
  Object.keys(data).forEach(s=>{
    const row=document.createElement("div");
    row.className="row";
    row.innerHTML=`
      <h2>${titles[s]}</h2>
      <div class="card" style="background-image:url(${images[s]})"
      onclick="openSeason('${s}')"></div>`;
    main.appendChild(row);
  });
}

/* OPEN */
function openSeason(s){
  currentSeason=s;
  currentEpisode=0;
  currentTime=0;

  document.getElementById("main").style.display="none";
  document.getElementById("playerPage").style.display="block";

  loadEpisodes();
  loadVideo();
}

/* EPISODES */
function loadEpisodes(){
  const el=document.getElementById("episodes");
  el.innerHTML="";
  data[currentSeason].forEach((v,i)=>{
    const d=document.createElement("div");
    d.className="ep";
    d.innerText="Bölüm "+(i+1);
    d.onclick=()=>{
      currentEpisode=i;
      currentTime=0;
      loadVideo();
    };
    el.appendChild(d);
  });
}

/* VIDEO */
function loadVideo(){
  clearInterval(timer);

  const box=document.getElementById("videoContainer");
  box.innerHTML="";

  const v=data[currentSeason][currentEpisode];

  if(currentSeason==="s1"){
    if(!ytReady){
      setTimeout(loadVideo,500);
      return;
    }

    player=new YT.Player('videoContainer',{
      videoId:v,
      playerVars:{autoplay:1,start:currentTime},
      events:{
        onReady:()=>{
          player.playVideo();
          startTimer();
        }
      }
    });

  }else{
    box.innerHTML=`<iframe src="https://www.dailymotion.com/embed/video/${v}?autoplay=1"></iframe>`;
    player=null;
    startTimer();
  }
}

/* TIMER */
function startTimer(){
  clearInterval(timer);
  timer=setInterval(()=>{
    if(player && player.getCurrentTime){
      currentTime=Math.floor(player.getCurrentTime());
    }else{
      currentTime++;
    }

    if(currentTime>1) skip.style.display="block";
    if(currentTime>=44) skip.style.display="none";
    if(currentTime>=1230) next.style.display="block";
  },1000);
}

/* SKIP */
function skipIntro(){
  currentTime=44;
  if(player) player.seekTo(44,true);
}

/* NEXT */
function nextEpisode(){
  if(currentEpisode < data[currentSeason].length-1){
    currentEpisode++;
    currentTime=0;
    loadVideo();
  }
}

/* HOME */
function goHome(){
  document.getElementById("main").style.display="block";
  document.getElementById("playerPage").style.display="none";

  if(player){
    player.destroy();
    player=null;
  }

  document.getElementById("videoContainer").innerHTML="";
  clearInterval(timer);
}

loadHome();
</script>

</body>
</html>
