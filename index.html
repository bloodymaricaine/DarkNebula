<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Melflix</title>

<style>
body{margin:0;background:#0b0f1a;color:#fff;font-family:sans-serif;}
header{position:fixed;width:100%;top:0;text-align:center;padding:15px;font-size:26px;background:#020617;cursor:pointer;z-index:10;}
.container{padding-top:80px}
.row{margin:20px}
.card{width:260px;height:340px;border-radius:12px;background-size:cover;background-position:center;cursor:pointer;}
#playerPage{display:none;padding-top:80px;display:flex;}
.video{width:100%;height:75vh;border:none;}
.episodes{width:260px;height:100vh;overflow-y:auto;background:#020617;padding:10px;}
.ep{padding:10px;cursor:pointer}
.ep.active{background:#334155}
#skip{position:absolute;left:20px;top:50%;background:#334155;padding:10px;cursor:pointer;display:none;}
</style>

</head>
<body>

<header onclick="goHome()">Melflix</header>

<div id="main" class="container"></div>

<div id="playerPage">
  <div style="flex:1;position:relative;">
    <iframe id="video" class="video" allow="autoplay" allowfullscreen></iframe>
    <div id="skip" onclick="skipIntro()">Intro Atla</div>
  </div>
  <div id="episodes" class="episodes"></div>
</div>

<script>
const data = {
  s1: ["_JKNDCvPc3A","4jHoj5geuJ8","50jkNwbNYFs"],
  s3: ["xa2flcw","xa2fu2s","xa2fu2u","xa2w11a"]
};

const titles = {s1:"Metal Fusion", s3:"Metal Fury"};
const images = {
  s1:"https://i.imgur.com/L8otzmh.jpg",
  s3:"https://i.imgur.com/Ttv8Bg9.jpg"
};

let currentSeason=null;
let currentEpisode=0;

function loadHome(){
  let main=document.getElementById("main");
  main.innerHTML="";

  Object.keys(data).forEach(s=>{
    let row=document.createElement("div");
    row.className="row";

    let title=document.createElement("h2");
    title.innerText=titles[s];

    let card=document.createElement("div");
    card.className="card";
    card.style.backgroundImage=`url(${images[s]})`;
    card.onclick=()=>openSeason(s);

    row.appendChild(title);
    row.appendChild(card);
    main.appendChild(row);
  });
}

function openSeason(s){
  currentSeason=s;
  currentEpisode=0;

  document.getElementById("main").style.display="none";
  document.getElementById("playerPage").style.display="flex";

  loadEpisodes();
  play();
}

function loadEpisodes(){
  let ep=document.getElementById("episodes");
  ep.innerHTML="";

  data[currentSeason].forEach((v,i)=>{
    let d=document.createElement("div");
    d.className="ep"+(i===currentEpisode?" active":"");
    d.innerText="Bölüm "+(i+1);
    d.onclick=()=>{currentEpisode=i; play();}
    ep.appendChild(d);
  });
}

function play(start=0){
  let v=data[currentSeason][currentEpisode];
  let iframe=document.getElementById("video");

  if(currentSeason==="s1"){
    iframe.src=`https://www.youtube.com/embed/${v}?autoplay=1&start=${start}`;
  } else {
    iframe.src=`https://www.dailymotion.com/embed/video/${v}?autoplay=1`;

    if(start>0){
      setTimeout(()=>{
        iframe.contentWindow.postMessage(JSON.stringify({
          command:"seek",
          parameters:[start]
        }),"*");
      },1000);
    }
  }

  document.getElementById("skip").style.display="block";
}

function skipIntro(){
  let iframe=document.getElementById("video");

  if(currentSeason==="s1"){
    play(44);
  } else {
    iframe.contentWindow.postMessage(JSON.stringify({
      command:"seek",
      parameters:[44]
    }),"*");
  }

  document.getElementById("skip").style.display="none";
}

function goHome(){
  document.getElementById("main").style.display="block";
  document.getElementById("playerPage").style.display="none";
  document.getElementById("video").src="";
}

loadHome();
</script>

</body>
</html>
