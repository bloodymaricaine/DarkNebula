<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Melflix</title>

<style>
body {margin:0;background:#0f172a;color:white;font-family:Arial;}
header {text-align:center;padding:15px;background:#020617;font-size:28px;cursor:pointer;}

.slider {display:flex;overflow-x:auto;gap:15px;padding:20px;}
.card {min-width:200px;height:280px;border-radius:10px;background-size:cover;cursor:pointer;}

#playerPage {display:none;padding:10px;}
.video {width:100%;height:60vh;border:none;}

.overlay {
  position:absolute;
  padding:10px 15px;
  background:rgba(0,0,0,0.5);
  border-radius:8px;
  color:white;
  cursor:pointer;
}

#skipBtn {left:20px;top:50%;}
#nextBtn {right:20px;top:50%;display:none;}
</style>
</head>

<body>

<header onclick="goHome()">Melflix</header>

<div id="main">
  <div class="slider" id="s1"></div>
</div>

<div id="playerPage">
  <div style="position:relative;">
    <iframe id="video" class="video"></iframe>
    <div id="skipBtn" class="overlay" onclick="skipIntro()">Intro Atla</div>
    <div id="nextBtn" class="overlay" onclick="nextEpisode()">Sonraki ▶</div>
  </div>
</div>

<script>

const videos = [
"_JKNDCvPc3A","4jHoj5geuJ8","50jkNwbNYFs","rWOJMX9xDyA",
"JVw2OrBg0Os","qCJhIAHU7c8","AjNAan3r_EQ","PBoW0shkDIo",
"xBou90Yk1i4","ZWxmhgtYBx4","QVPvEd4N81Y","FTsaUUU_P3M"
];

let index=0;
let timer;

function init(){
  const s=document.getElementById("s1");
  videos.forEach((v,i)=>{
    const c=document.createElement("div");
    c.className="card";
    c.style.backgroundImage="url(https://i.imgur.com/L8otzmh.jpg)";
    c.onclick=()=>openVideo(i);
    s.appendChild(c);
  });
}

function openVideo(i){
  index=i;
  document.getElementById("main").style.display="none";
  document.getElementById("playerPage").style.display="block";
  play();
}

function play(){
  clearInterval(timer);

  document.getElementById("video").src=
  "https://www.youtube.com/embed/"+videos[index]+"?autoplay=1";

  document.getElementById("skipBtn").style.display="block";
  document.getElementById("nextBtn").style.display="none";

  let t=0;

  timer=setInterval(()=>{
    t++;

    if(t>44) document.getElementById("skipBtn").style.display="none";

    if(t>1239) document.getElementById("nextBtn").style.display="block";

    if(t>1320) nextEpisode();

  },1000);
}

function skipIntro(){
  document.getElementById("video").src=
  "https://www.youtube.com/embed/"+videos[index]+"?autoplay=1&start=44";
}

function nextEpisode(){
  if(index<videos.length-1){
    index++;
    play();
  }
}

function goHome(){
  document.getElementById("main").style.display="block";
  document.getElementById("playerPage").style.display="none";
  document.getElementById("video").src="";
  clearInterval(timer);
}

init();

</script>

</body>
</html>
